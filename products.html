<!DOCTYPE html>
<html>
<head>
<title>Products - Profit Plug</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  background: linear-gradient(180deg,#0b3d91,#111827);
  color: white;
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
}

.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.nav a {
  margin-left: 20px;
  font-weight: 500;
  transition: 0.3s;
}
.nav a:hover { color: #38bdf8; }

.container {
  max-width: 1100px;
  margin: auto;
  padding: 80px 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
  position: relative;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-8px);
  background: rgba(255,255,255,0.08);
}

.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: gold;
  color: black;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: bold;
}

button {
  background: #38bdf8;
  color: black;
  padding: 10px 20px;
  border-radius: 20px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(56,189,248,0.6);
  transition: 0.3s;
  cursor: pointer;
}
button:hover { background: #0ea5e9; }

#popup {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #111827;
  padding: 15px 20px;
  border-radius: 10px;
  display: none;
  box-shadow: 0 5px 20px rgba(0,0,0,0.5);
  font-weight: 500;
}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="font-bold text-xl">Profit Plug</div>
  <div>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="vendors.html">Vendors</a>
  </div>
</div>

<!-- PAGE HEADER -->
<div class="container text-center mb-12">
  <h1 class="text-4xl font-bold mb-4">Our Products</h1>
  <p class="text-gray-300 mb-2">Trusted by beginner and advanced resellers</p>
  <p class="text-orange-400 font-bold">⚠️ Limited spots available — act fast!</p>
</div>

<!-- PRODUCT GRID -->
<div class="container grid md:grid-cols-3 gap-6">

  <div class="card" onclick="showProductPopup('Reselling Course',25)">
    <div class="badge">BEST SELLER</div>
    <h2 class="text-xl font-bold mb-2">Reselling Course</h2>
    <p class="text-gray-300 mb-2">$25</p>
    <p class="text-gray-400 mb-4">Step-by-step beginner system</p>
    <button onclick="event.stopPropagation(); addToCart('Reselling Course',25)">Add to Cart</button>
  </div>

  <div class="card" onclick="showProductPopup('Vendor Bundle',250)">
    <h2 class="text-xl font-bold mb-2">Vendor Bundle</h2>
    <p class="text-gray-300 mb-2">$250</p>
    <p class="text-gray-400 mb-4">Full supplier access</p>
    <button onclick="event.stopPropagation(); addToCart('Vendor Bundle',250)">Add to Cart</button>
  </div>

  <div class="card" onclick="showProductPopup('Single Vendor',50)">
    <h2 class="text-xl font-bold mb-2">Single Vendor</h2>
    <p class="text-gray-300 mb-2">$50</p>
    <p class="text-gray-400 mb-4">One verified supplier</p>
    <button onclick="event.stopPropagation(); addToCart('Single Vendor',50)">Add to Cart</button>
  </div>

</div>

<!-- POPUP NOTIFICATIONS -->
<div id="popup"></div>

<script>
/* CART FUNCTIONALITY */
function addToCart(name, price){
  let qty = prompt(`Enter quantity for ${name}:`, '1');
  if(qty && !isNaN(qty)){
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    cart.push({name:name, price:price, qty:parseInt(qty)});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert(`${qty} x ${name} added to cart ✔`);
  }
}

/* PRODUCT POPUP ON CARD CLICK */
function showProductPopup(name, price){
  let qty = prompt(`${name}\nPrice: $${price}\n\nEnter quantity:`,'1');
  if(qty && !isNaN(qty)){
    let cart = JSON.parse(localStorage.getItem("cart") || "[]");
    cart.push({name:name, price:price, qty:parseInt(qty)});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert(`${qty} x ${name} added to cart ✔`);
  }
}

/* FAKE SALES POPUP */
let names=["Mike","Sarah","Jason","Alex"];
setInterval(()=>{
  let popup=document.getElementById("popup");
  popup.innerText=names[Math.floor(Math.random()*names.length)]+" just bought this!";
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",3000);
},7000);
</script>
</body>
</html>
