<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.paypal.com/sdk/js?client-id=AYQd8kywzPLzuNCPox1-G2rsqQXTJiC9IMhZHytaxib8HstErg_jOBmSsc2amSaYpoM_5WllDsLB3oX4&currency=USD"></script>

</head>

<body class="bg-gray-900 text-white p-10">

<h1 class="text-3xl mb-6">
Checkout
</h1>

<table id="cartTable" class="w-full mb-6"></table>

<h2 id="total" class="text-xl mb-6"></h2>

<div id="paypal-button-container"></div>

<br>

<a href="index.html">Back</a>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[]

let table=document.getElementById("cartTable")

let total=0

cart.forEach(item=>{

let row=document.createElement("tr")

row.innerHTML=`

<td>${item.name}</td>
<td>$${item.price}</td>
<td>${item.qty}</td>
<td>$${item.price*item.qty}</td>

`

table.appendChild(row)

total+=item.price*item.qty

})

document.getElementById("total").innerText="Total: $"+total

paypal.Buttons({

createOrder:function(data,actions){

return actions.order.create({

purchase_units:[{

amount:{value:total.toFixed(2)}

}]

})

},

onApprove:function(data,actions){

return actions.order.capture().then(function(){

alert("Payment Successful! Course Unlocked.")

localStorage.setItem("courseUnlocked","true")

window.location.href="course.html"

})

}

}).render('#paypal-button-container')

</script>

</body>
</html>
