<!DOCTYPE html>
<html>
<head>

<title>Cart - Profit Plug</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:linear-gradient(180deg,#0b3d91,#111827);
color:white;
font-family:sans-serif;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:16px;
}

button{
background:#38bdf8;
color:black;
padding:10px 20px;
border-radius:20px;
font-weight:bold;
transition:.3s;
}

button:hover{
background:#0ea5e9;
}

.remove-btn{
background:red;
color:white;
padding:6px 12px;
border-radius:10px;
font-size:12px;
}

.checkout{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:16px;
text-align:center;
}

</style>

</head>

<body class="p-6">

<h1 class="text-4xl text-center mb-10 font-bold">
Your Cart
</h1>

<div class="max-w-4xl mx-auto">

<div id="cartItems" class="space-y-4"></div>

<div id="emptyMsg" class="text-center text-gray-400 mt-10 hidden">
Your cart is empty
</div>

<!-- TOTAL -->
<div class="card mt-10 text-center">

<h2 class="text-2xl mb-4">Total</h2>

<p id="totalPrice" class="text-3xl text-sky-400 font-bold">
$0
</p>

</div>

<!-- CHECKOUT -->
<div class="checkout mt-10">

<h2 class="text-2xl mb-4">Checkout</h2>

<p class="mb-2">
Send payment via Cash App:
</p>

<p class="text-green-400 text-xl font-bold mb-4">
$BOZOZAIN
</p>

<p class="text-gray-300 text-sm mb-6">
After sending, contact us to receive your course + vendor access.
</p>

<button onclick="copyCashApp()">
Copy Cash App
</button>

<br><br>

<a href="index.html">
<button>
Back to Home
</button>
</a>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

function renderCart(){

let container = document.getElementById("cartItems")
let total = 0

container.innerHTML=""

if(cart.length === 0){
document.getElementById("emptyMsg").style.display="block"
return
}

cart.forEach((item,index)=>{

let itemTotal = item.price * item.qty
total += itemTotal

container.innerHTML += `
<div class="card flex justify-between items-center">

<div>
<h2 class="text-xl font-bold">${item.name}</h2>
<p>$${item.price} x ${item.qty}</p>
<p class="text-sky-400">Total: $${itemTotal}</p>
</div>

<button class="remove-btn" onclick="removeItem(${index})">
Remove
</button>

</div>
`

})

document.getElementById("totalPrice").innerText = "$" + total

}

function removeItem(index){
cart.splice(index,1)
localStorage.setItem("cart", JSON.stringify(cart))
renderCart()
}

function copyCashApp(){
navigator.clipboard.writeText("$BOZOZAIN")
alert("Cash App copied!")
}

renderCart()

</script>

</body>
</html>
