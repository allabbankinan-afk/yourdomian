<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - Profit Plug</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.paypal.com/sdk/js?client-id=AYQd8kywzPLzuNCPox1-G2rsqQXTJiC9IMhZHytaxib8HstErg_jOBmSsc2amSaYpoM_5WllDsLB3oX4&currency=USD"></script>

<style>

body{
background:linear-gradient(180deg,#0b3d91,#111827);
color:white;
font-family:sans-serif;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:30px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<div class="max-w-5xl mx-auto p-6">

<!-- HEADER -->

<div class="flex justify-between items-center mb-10">

<h1 class="text-3xl font-bold">
Checkout
</h1>

<a href="index.html" class="text-gray-300 hover:text-white">
← Back
</a>

</div>


<div class="grid md:grid-cols-2 gap-8">

<!-- LEFT SIDE (ORDER DETAILS) -->

<div class="card">

<h2 class="text-xl font-bold mb-6">
Order Summary
</h2>

<table id="cartTable" class="w-full mb-6 text-left"></table>

<hr class="border-gray-600 mb-4">

<h2 id="total" class="text-2xl font-bold"></h2>

</div>


<!-- RIGHT SIDE (PAYMENT) -->

<div class="card text-center">

<h2 class="text-xl font-bold mb-4">
Secure Payment
</h2>

<p class="text-gray-300 mb-6">
Pay safely using PayPal or Venmo
</p>

<div id="paypal-button-container"></div>

<p class="text-gray-400 text-sm mt-6">
✔ Instant course access after payment  
<br>
✔ Secure encrypted checkout
</p>

</div>

</div>

</div>



<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[]

let table=document.getElementById("cartTable")

let total=0

cart.forEach(item=>{

let row=document.createElement("tr")

row.innerHTML=`

<td class="py-2">${item.name}</td>
<td>$${item.price}</td>
<td>x${item.qty}</td>
<td class="text-sky-400">$${item.price*item.qty}</td>

`

table.appendChild(row)

total+=item.price*item.qty

})

document.getElementById("total").innerText="Total: $"+total


paypal.Buttons({

createOrder:function(data,actions){

return actions.order.create({
purchase_units:[{
amount:{value:total.toFixed(2)}
}]
})

},

onApprove:function(data,actions){

return actions.order.capture().then(function(){

localStorage.setItem("courseUnlocked","true")

alert("Payment Successful! Course Unlocked.")

window.location.href="course.html"

})

}

}).render('#paypal-button-container')

</script>

</body>
</html>
