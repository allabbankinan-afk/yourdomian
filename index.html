<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profit Plug</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:linear-gradient(180deg,#0b3d91,#111827);
color:white;
font-family:sans-serif;
}

.container{
max-width:1000px;
margin:auto;
padding:80px 20px;
text-align:center;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:16px;
margin-top:40px;
}

button{
background:#38bdf8;
color:black;
padding:12px 24px;
border-radius:30px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1 class="text-5xl font-bold mb-6">
Profit Plug
</h1>

<p class="text-xl mb-6">
Learn how to make money reselling designer clothing & accessories.
</p>

<div class="card">

<h2 class="text-2xl font-bold mb-4">
Profit Plug Reselling Course
</h2>

<p>
Complete step-by-step course teaching you how to flip designer items for profit.
</p>

<p class="text-sky-400 text-xl mt-4">
$25
</p>

<br>

<button onclick="addToCart()">
Buy Course
</button>

<br><br>

<a href="course.html">
<button>
Access Course
</button>
</a>

</div>

</div>

<script>

function addToCart(){

let cart=[]

cart.push({
name:"Profit Plug Course",
price:25,
qty:1
})

localStorage.setItem("cart",JSON.stringify(cart))

window.location.href="cart.html"

}

</script>

</body>
</html>
