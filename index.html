<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Plug - Trading Course Store</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: Inter, system-ui, sans-serif;
    background: #0b3d91;
    color: #f3f4f6;
    scroll-behavior: smooth;
  }
  .glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    transition: transform 0.2s, background 0.2s;
  }
  .glass:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.12);
  }
  button { cursor: pointer; }
  a { text-decoration: none; }
  .hidden { display: none; }
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- Navbar -->
<header class="sticky top-0 z-50 bg-slate-950/70 backdrop-blur border-b border-white/10">
  <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="#" class="text-2xl font-black tracking-wide">Profit <span class="text-sky-300">Plug</span></a>
    <div class="flex gap-6 text-sm text-slate-200">
      <button onclick="showSection('products')">Products</button>
      <button onclick="showSection('cart')">Cart (<span id="cart-count">0</span>)</button>
    </div>
  </nav>
</header>

<main class="flex-grow max-w-7xl mx-auto px-6 py-20">

  <!-- Products List -->
  <section id="products-section">
    <h1 class="text-4xl font-black mb-10 text-center">Available Products</h1>
    <div id="products-container" class="grid md:grid-cols-3 gap-8"></div>
  </section>

  <!-- Product Detail -->
  <section id="product-section" class="hidden">
    <button onclick="showSection('products')" class="mb-6 text-sky-400 font-bold">← Back to Products</button>
    <div class="glass rounded-3xl p-10">
      <h1 class="text-4xl font-black mb-4" id="product-name"></h1>
      <p class="text-slate-300 mb-2" id="product-short"></p>
      <p class="font-black text-2xl mb-4" id="product-price"></p>
      <p class="text-slate-300 mb-6 whitespace-pre-line" id="product-long"></p>

      <label class="block mb-2">Quantity:</label>
      <input type="number" id="quantity" value="1" min="1" class="text-black px-3 py-1 rounded-lg mb-4 w-24">

      <button id="buy-now" class="bg-sky-400 text-slate-950 font-bold py-2 px-4 rounded-full hover:scale-105 transition">Add to Cart</button>
    </div>
  </section>

  <!-- Cart Section -->
  <section id="cart-section" class="hidden">
    <h1 class="text-4xl font-black mb-10 text-center">Your Cart</h1>
    <div id="cart-container" class="space-y-6"></div>

    <div class="mt-10 text-right">
      <p class="text-xl font-bold mb-4">Total: $<span id="cart-total">0</span></p>
      <button id="checkout" class="bg-sky-400 text-slate-950 font-bold py-2 px-4 rounded-full hover:scale-105 transition">Checkout via Cash App</button>
    </div>
  </section>

</main>

<footer class="border-t border-white/10 py-8 px-6 text-center text-slate-400 text-sm">
  <p>© 2026 Profit Plug. Educational content for legal resale practices only.</p>
</footer>

<script>
const products = {
  'trading-course': {
    name: "Trading Course",
    price: 25,
    short: "No experience needed — step-by-step roadmap to start trading confidently.",
    long: `Stop gambling and start trading. Most beginners lose money because they treat the market like a casino. This comprehensive, step-by-step course is designed to take you from knowing nothing about charts to executing your first profitable trades with confidence. We focus on a "risk-first" methodology, teaching you how to protect your capital before chasing profits.
What You’ll Learn:
- Market Mechanics: Decoding candlesticks, support/resistance, and market structure without confusing indicators.
- Risk Management: The non-negotiable 1% rule to keep you in the game.
- Price Action Strategy: Identifying high-probability setups in Stocks and Forex.
- Psychological Conditioning: Mastering fear and greed to avoid emotional, "revenge" trades.
- Live Simulation: Practicing in a risk-free environment to build muscle memory.
Best for: Students, busy professionals, and beginners looking for a disciplined, long-term skillset.`,
    cashLink: "https://cash.app/$kinanlbnx"
  }
};

// Initialize Products List
const productsContainer = document.getElementById('products-container');
for (const key in products) {
  const prod = products[key];
  const card = document.createElement('div');
  card.className = 'glass rounded-3xl p-6';
  card.innerHTML = `
    <h2 class="text-2xl font-bold mb-2">${prod.name}</h2>
    <p class="text-slate-300 mb-2">${prod.short}</p>
    <p class="font-black text-xl mb-4">$${prod.price}</p>
    <button class="bg-sky-400 text-slate-950 font-bold py-2 px-4 rounded-full hover:scale-105 transition" onclick="viewProduct('${key}')">View Product</button>
  `;
  productsContainer.appendChild(card);
}

// Section switching
function showSection(section) {
  document.getElementById('products-section').classList.add('hidden');
  document.getElementById('product-section').classList.add('hidden');
  document.getElementById('cart-section').classList.add('hidden');

  if(section === 'products') document.getElementById('products-section').classList.remove('hidden');
  if(section === 'product') document.getElementById('product-section').classList.remove('hidden');
  if(section === 'cart') {
    document.getElementById('cart-section').classList.remove('hidden');
    renderCart();
  }
}

// View product
function viewProduct(key) {
  const prod = products[key];
  document.getElementById('product-name').innerText = prod.name;
  document.getElementById('product-short').innerText = prod.short;
  document.getElementById('product-price').innerText = `$${prod.price}`;
  document.getElementById('product-long').innerText = prod.long;
  document.getElementById('quantity').value = 1;

  document.getElementById('buy-now').onclick = () => {
    const qty = parseInt(document.getElementById('quantity').value);
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existing = cart.find(i => i.key === key);
    if(existing) existing.quantity += qty;
    else cart.push({key, quantity: qty});
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    alert('Added to cart!');
    showSection('cart');
  };

  showSection('product');
}

// Cart Functions
function renderCart() {
  const container = document.getElementById('cart-container');
  container.innerHTML = '';
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let total = 0;

  cart.forEach(item => {
    const prod = products[item.key];
    const itemTotal = prod.price * item.quantity;
    total += itemTotal;

    const div = document.createElement('div');
    div.className = 'glass rounded-3xl p-6 flex justify-between items-center';
    div.innerHTML = `
      <div>
        <h2 class="text-xl font-bold">${prod.name}</h2>
        <p>$${prod.price} each</p>
      </div>
      <div class="flex items-center gap-2">
        <input type="number" min="1" value="${item.quantity}" data-key="${item.key}" class="quantity-input text-black px-2 py-1 rounded-lg">
        <span class="font-bold">$${itemTotal}</span>
        <button data-key="${item.key}" class="remove-btn text-red-500 font-bold">Remove</button>
      </div>
    `;
    container.appendChild(div);
  });

  document.getElementById('cart-total').innerText = total;
}

document.addEventListener('input', e => {
  if(e.target.classList.contains('quantity-input')) {
    const key = e.target.dataset.key;
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const item = cart.find(i => i.key === key);
    if(item) item.quantity = parseInt(e.target.value);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
    updateCartCount();
  }
});

document.addEventListener('click', e => {
  if(e.target.classList.contains('remove-btn')) {
    const key = e.target.dataset.key;
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart = cart.filter(i => i.key !== key);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
    updateCartCount();
  }
});

// Checkout
document.getElementById('checkout').onclick = () => {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  if(cart.length === 0) { alert('Cart is empty!'); return; }
  let total = 0;
  cart.forEach(item => total += products[item.key].price * item.quantity);
  const link = `https://cash.app/$kinanlbnx/$${total}`;
  window.open(link, '_blank');
};

// Update cart count in navbar
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  document.getElementById('cart-count').innerText = cart.reduce((a,b)=>a+b.quantity,0);
}

updateCartCount();
</script>
</body>
</html>
